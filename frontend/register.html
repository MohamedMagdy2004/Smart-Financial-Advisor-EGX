<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGX AI Bot - Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0b132b 0%, #1c2541 40%, #280875 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 2px, transparent 2px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            padding: 15px;
        }

        .register-card {
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 35px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        .logo {
            text-align: center;
            margin-bottom: 5px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .logo h1 {
            font-size: 22px;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 11px;
            color: #a0aec0;
            margin-top: 3px;
        }

        .input-group {
            margin-bottom: 8px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #a0aec0;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 13px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .register-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #a0aec0;
        }

        .login-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .login-link a:hover {
            text-decoration: underline;
            color: #00ff88;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid rgba(255, 68, 68, 0.5);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #ff8888;
            text-align: center;
            display: none;
        }

        .success-message {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.5);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #88ff88;
            text-align: center;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 10px;
            font-size: 11px;
            color: rgba(160, 174, 192, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="logo">
                <div class="logo-img">
                    <img src="Chat bot logo.jpg" alt="EGX AI Bot" style="width: 35%; height: 35%; object-fit: cover; border-radius: 100px;">
                </div>
                <h1>Create Account</h1>
                <p>Join EGX AI Financial Bot</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage">Account created successfully! Redirecting...</div>

            <form id="registerForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="register-btn">📝 Register</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="index.html">Login</a>
            </div>
            <div class="footer">
                EGX AI Bot v1.0
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Clear previous messages
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
            
            // Validation
            if (username.length < 3) {
                showError('Username must be at least 3 characters');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showError('Please enter a valid email address');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            // Get existing users
            const users = JSON.parse(localStorage.getItem('egx_users') || '[]');
            
            // Check if username already exists
            if (users.find(u => u.username === username)) {
                showError('Username already exists. Please choose another.');
                return;
            }
            
            // Check if email already exists
            if (users.find(u => u.email === email)) {
                showError('Email already registered. Please login instead.');
                return;
            }
            
            // Save new user
            users.push({
                username: username,
                email: email,
                password: password,
                createdAt: new Date().toISOString()
            });
            
            localStorage.setItem('egx_users', JSON.stringify(users));
            
            // Show success and redirect
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
