<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGX AI Bot - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0b132b 0%, #1c2541 40%, #280875 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Neural network background */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 2px, transparent 2px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 35px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .logo h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
         .logo p {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #a0aec0;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #a0aec0;
        }

        .register-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .register-link a:hover {
            text-decoration: underline;
            color: #00ff88;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid rgba(255, 68, 68, 0.5);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #ff8888;
            text-align: center;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: rgba(160, 174, 192, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-img">
                    <img src="Chat bot logo.jpg" alt="EGX AI Bot" style="width: 45%; height: 45%; object-fit: cover; border-radius: 100px;">
                </div>
                <h1>EGX AI FINANCIAL BOT</h1>
                <p>Egyptian Stock Exchange Intelligence</p>
            </div>

            <div class="error-message" id="errorMessage">Invalid username or password</div>

            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="username" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn">🔐 Login</button>
            </form>

            <div class="register-link">
                Don't have an account? <a href="register.html">Register</a>
            </div>
            <div class="footer">
                EGX AI Bot v1.0
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('http://localhost:8000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok && data.user) {
                    // Save current user session
                    localStorage.setItem('egx_current_user', JSON.stringify({
                        username: data.user.full_name,
                        email: data.user.email,
                        id: data.user.id
                    }));
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    const errorMsg = document.getElementById('errorMessage');
                    errorMsg.textContent = data.detail || 'Invalid email or password';
                    errorMsg.style.display = 'block';
                    setTimeout(() => {
                        errorMsg.style.display = 'none';
                    }, 3000);
                }
            } catch (error) {
                const errorMsg = document.getElementById('errorMessage');
                errorMsg.textContent = 'Cannot connect to server';
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
